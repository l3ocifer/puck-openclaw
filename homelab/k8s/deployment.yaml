---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: puck
  namespace: agents-shared
  labels:
    app.kubernetes.io/name: puck
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: puck
  template:
    metadata:
      labels:
        app.kubernetes.io/name: puck
        app.kubernetes.io/component: agent
    spec:
      affinity:
        nodeAffinity:
          # Puck wants RAM (long manuscripts in context, video frames
          # in memory while transcribing). Soft-prefer thebeast.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - { key: kubernetes.io/hostname, operator: In, values: [thebeast] }
            - weight: 20
              preference:
                matchExpressions:
                  - { key: kubernetes.io/hostname, operator: In, values: [alef] }
      serviceAccountName: puck-ops
      restartPolicy: Always
      securityContext:
        runAsNonRoot: false
        fsGroup: 0
      initContainers:
        # OpenClaw writes runtime state (`.openclaw/`, sessions, caches) into
        # OPENCLAW_WORKSPACE, but our persona ConfigMap is an inherently
        # read-only tmpfs. Seed the writable workspace by copying the
        # persona files in at startup so SOUL.md / AGENTS.md / IDENTITY.md
        # / etc. land in the workspace tree the agent actually uses.
        # Also seed the per-agent auth profile + models registry so the
        # default `main` agent can route inference through LiteLLM
        # without requiring an interactive `openclaw infer model auth login`.
        - name: seed-workspace
          image: busybox:1.37
          command: ["sh", "-c"]
          envFrom:
            - secretRef: { name: puck-secrets }
          args:
            - |
              set -eu
              mkdir -p /workspace /agent-state
              cp -f /persona/*.md /workspace/ 2>/dev/null || true
              ls -la /workspace
              # Auth-profiles.json — both `litellm` (custom catalog) and
              # `openai` (built-in agent default for `gpt-5.5`) pointed at
              # the cluster LiteLLM proxy so every model the built-in
              # OpenClaw catalog references is served locally.
              cat > /agent-state/auth-profiles.json <<JSON
              {
                "litellm": {
                  "type": "api_key",
                  "apiKey": "${LITELLM_API_KEY}",
                  "baseUrl": "http://litellm.inference.svc.cluster.local:4000/v1"
                },
                "openai": {
                  "type": "api_key",
                  "apiKey": "${LITELLM_API_KEY}",
                  "baseUrl": "http://litellm.inference.svc.cluster.local:4000/v1"
                }
              }
              JSON
              cat > /agent-state/models.json <<JSON
              {
                "providers": {
                  "litellm": {
                    "baseUrl": "http://litellm.inference.svc.cluster.local:4000/v1",
                    "api": "openai-completions",
                    "apiKey": "${LITELLM_API_KEY}",
                    "models": [
                      {"id":"chat","name":"LiteLLM chat","contextWindow":32768,"maxTokens":8192,"input":["text"],"cost":{"input":0,"output":0,"cacheRead":0,"cacheWrite":0}},
                      {"id":"long","name":"LiteLLM long","contextWindow":131072,"maxTokens":8192,"input":["text"],"cost":{"input":0,"output":0,"cacheRead":0,"cacheWrite":0}},
                      {"id":"code","name":"LiteLLM code","contextWindow":32768,"maxTokens":8192,"input":["text"],"cost":{"input":0,"output":0,"cacheRead":0,"cacheWrite":0}},
                      {"id":"frontier","name":"LiteLLM frontier","contextWindow":200000,"maxTokens":8192,"input":["text"],"cost":{"input":0,"output":0,"cacheRead":0,"cacheWrite":0}}
                    ]
                  }
                },
                "defaults": {
                  "primary": "litellm/long",
                  "fallbacks": ["litellm/chat"]
                }
              }
              JSON
              chmod 600 /agent-state/auth-profiles.json
              ls -la /agent-state/
          volumeMounts:
            - { name: state, mountPath: /workspace,   subPath: openclaw/workspace }
            - { name: state, mountPath: /agent-state, subPath: openclaw/agents/main/agent }
            - { name: persona, mountPath: /persona,   readOnly: true }
      containers:
        - name: openclaw
          image: ghcr.io/l3ocifer/puck-openclaw:homelab
          imagePullPolicy: Always
          command: ["node", "/opt/openclaw/openclaw.mjs"]
          args:
            - "gateway"
            - "--port=18789"
            - "--bind=lan"
            - "--allow-unconfigured"
          env:
            - { name: AGENT_NAME, value: "Puck" }
            - { name: AGENT_ID, value: "puck" }
            - { name: OPENCLAW_CONFIG, value: "/tmp/openclaw-missing.json" }
            - { name: OPENCLAW_CONFIG_PATH, value: "/tmp/openclaw-missing.json" }
            - { name: OPENCLAW_WORKSPACE, value: "/root/.openclaw/workspace-rw" }
            - { name: TZ, value: "America/New_York" }
            - { name: HARDSTOP_PATH, value: "/data/HARDSTOP-PUCK" }
          envFrom:
            - secretRef: { name: puck-secrets }
          ports:
            - { name: gateway, containerPort: 18789, protocol: TCP }
            - { name: metrics, containerPort: 9100,  protocol: TCP }
          livenessProbe:
            httpGet: { path: /healthz, port: gateway }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /readyz, port: gateway }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { memory: "8Gi" }
          volumeMounts:
            - { name: state,           mountPath: /root/.openclaw, subPath: openclaw }
            - { name: state,           mountPath: /data, subPath: hardstop }
            - { name: state,           mountPath: /workspace/media, subPath: media }
            # The agent's persona-seeded workspace lives on the state PVC
            # under `openclaw/workspace`. The init container copies the
            # persona ConfigMap into it at startup; OpenClaw can then
            # write its `.openclaw/` runtime state alongside.
            - { name: state,           mountPath: /root/.openclaw/workspace-rw, subPath: openclaw/workspace }
            # OpenClaw's workspace bootstrap falls back to packaged templates
            # at /opt/openclaw/docs/reference/templates. The homelab image does
            # not currently package docs/, so expose the same bootstrap files
            # from the persona ConfigMap to keep heartbeat/cron bootstrap alive.
            - { name: persona,         mountPath: /opt/openclaw/docs/reference/templates, readOnly: true }
            - { name: openclaw-config, mountPath: /root/.openclaw/openclaw.json, subPath: openclaw.json, readOnly: true }
            - { name: graph-puck,      mountPath: /data/graphs/puck }
            - { name: graph-frick,     mountPath: /data/graphs/frick,    readOnly: true }
            - { name: graph-frack,     mountPath: /data/graphs/frack,    readOnly: true }
            - { name: graph-sancho,    mountPath: /data/graphs/sancho,   readOnly: true }
            - { name: graph-vetinari,  mountPath: /data/graphs/vetinari, readOnly: true }
            - { name: graph-quirm,     mountPath: /data/graphs/quirm,    readOnly: true }
            - { name: graph-vimes,     mountPath: /data/graphs/vimes,    readOnly: true }
            - { name: graph-leo,       mountPath: /data/graphs/leo }
              # Restricted writes per HANDOFF.md §4 — runtime-enforced.
              # Puck writes only to pages/world/creative-projects.md and
              # pages/agent-contributions/puck/.
      volumes:
        - { name: state,           persistentVolumeClaim: { claimName: puck-state } }
        - { name: persona,         configMap: { name: puck-persona } }
        - { name: openclaw-config, configMap: { name: puck-openclaw-config } }
        - { name: graph-puck,      persistentVolumeClaim: { claimName: puck-graph } }
        - { name: graph-frick,     persistentVolumeClaim: { claimName: frick-graph } }
        - { name: graph-frack,     persistentVolumeClaim: { claimName: frack-graph } }
        - { name: graph-sancho,    persistentVolumeClaim: { claimName: sancho-graph } }
        - { name: graph-vetinari,  persistentVolumeClaim: { claimName: vetinari-graph } }
        - { name: graph-quirm,     persistentVolumeClaim: { claimName: quirm-graph } }
        - { name: graph-vimes,     persistentVolumeClaim: { claimName: vimes-graph } }
        - { name: graph-leo,       persistentVolumeClaim: { claimName: leo-graph } }
      imagePullSecrets:
        - { name: ghcr-credentials }
