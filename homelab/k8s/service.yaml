kind: Service
metadata:
  name: puck
  namespace: agents-shared
  labels:
    app.kubernetes.io/name: puck
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: puck
  ports:
    - { name: gateway, port: 18789, targetPort: gateway, protocol: TCP }
    - { name: metrics, port: 9100,  targetPort: metrics, protocol: TCP }
