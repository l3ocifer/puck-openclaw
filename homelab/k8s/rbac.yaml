---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: puck-ops
  namespace: agents-shared
  labels:
    app.kubernetes.io/name: puck

---
# Self-introspection in agents-shared
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: puck-self
  namespace: agents-shared
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: puck-self
  namespace: agents-shared
subjects:
  - kind: ServiceAccount
    name: puck-ops
    namespace: agents-shared
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: puck-self

---
# Cluster-wide read-only — Puck reads "where am I, what's healthy"
# but does not operate the cluster. Frick handles cluster ops.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: puck-cluster-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: puck-cluster-readonly
subjects:
  - kind: ServiceAccount
    name: puck-ops
    namespace: agents-shared
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: puck-cluster-readonly
